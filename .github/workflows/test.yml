name: Test

on:
  #push:
  #  branches: [ master ]
  #pull_request:
  #  branches: [ master ]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build and use downloaded binary instead"
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      version:
        description: "Version to download when skip_build=true (e.g., v0.14.0)"
        required: false
        default: 'latest'
        type: string
      test_timeout:
        description: "Global test timeout in seconds"
        required: false
        default: '300'
        type: string


jobs:
  # an integration test designed to catch bugs triggered by updating (database migrations and such)
  upgrades:
    name: upgrade from ${{ matrix.aw_server_old }} ${{ matrix.aw_server_old_args }} to ${{ matrix.aw_server_new }} ${{ matrix.aw_server_new_args }}
    # needs: [build]
    #if: startsWith(github.ref, 'refs/tags/v')  # only run on tag
    runs-on: ubuntu-latest
    env:
      old_version: 'v0.12.2'
      new_version: 'v0.13.1'
    strategy:
      fail-fast: false
      matrix:
        aw_server_old: ['aw-server', 'aw-server-rust']
        aw_server_new: ['aw-server', 'aw-server-rust']
        aw_server_old_args: ['']
        aw_server_new_args: ['']
        include:
          # python, peewee (default)
          - aw_server_old: 'aw-server'
            aw_server_new: 'aw-server'
          # python, sqlite
          # FIXME: sqlite broken since aw-server enabled flask multithreading (new default)
          - aw_server_old: "aw-server"
            aw_server_new: "aw-server"
            aw_server_old_args: "--storage sqlite"
            aw_server_new_args: "--storage sqlite"
            old_version: 'v0.12.2'
            new_version: 'v0.13.1'
          # python, peewee to sqlite
          # FIXME: broken, same thing with sqlite as above
          - aw_server_old: "aw-server"
            aw_server_new: "aw-server"
            aw_server_old_args: "--storage peewee"
            aw_server_new_args: "--storage sqlite"
            old_version: 'v0.12.2'
            new_version: 'v0.13.1'
        exclude:
          # rust to python, not supported
          - aw_server_old: 'aw-server-rust'
            aw_server_new: 'aw-server'

    steps:
      # Will download all artifacts to path
      - name: Download build artifacts
        if: ${{ env.new_version == 'this' }}
        uses: actions/download-artifact@v8
        with:
          name: builds-Linux-py3.9
          path: dist

      # Only used during testing, so we don't have to wait for the main build job
      - name: Download new ActivityWatch
        if: ${{ env.new_version != 'this' }}
        run: |
          mkdir dist
          pushd dist
          wget -q https://github.com/ActivityWatch/activitywatch/releases/download/${{ env.new_version }}/activitywatch-${{ env.new_version }}-linux-x86_64.zip

      - name: Install new & old ActivityWatch
        run: |
          pushd dist

          # New version
          unzip activitywatch-*-linux-x86_64.zip
          mv activitywatch/ aw-new

          # Old version
          wget -q -O aw-old.zip https://github.com/ActivityWatch/activitywatch/releases/download/${{ env.old_version }}/activitywatch-${{ env.old_version }}-linux-x86_64.zip
          unzip aw-old.zip
          mv activitywatch/ aw-old

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: dist

      - name: Run and test old server
        run: |
          bin=dist/aw-old/${{ matrix.aw_server_old }}/${{ matrix.aw_server_old }}
          url="http://localhost:5600"

          # Check version
          $bin --version || true  # due to bug in old aw-server

          # Run server and log output
          $bin ${{ matrix.aw_server_old_args }} >> log-old.txt 2>&1 &
          sleep 5  # wait for startup

          # Set server URL

          # Get server info
          curl "$url/api/0/info" --fail-with-body

          # Create bucket
          curl -X 'POST' --fail-with-body \
            "$url/api/0/buckets/aw-test" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d '{
            "client": "test",
            "type": "test",
            "hostname": "test"
          }'

          # Get buckets
          curl "$url/api/0/buckets/" -H 'accept: application/json'

          # Send a heartbeat
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -X 'POST' \
            "$url/api/0/buckets/aw-test/heartbeat?pulsetime=0" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d '{
            "timestamp": "'$timestamp'",
            "duration": 0,
            "data": {"key": "test value"}
          }'

          # Give a sec, then kill server process
          sleep 1
          kill $!

      - name: Run and test new server
        run: |
          bin=dist/aw-new/${{ matrix.aw_server_new }}/${{ matrix.aw_server_new }}
          url="http://localhost:5600"

          # Check version
          $bin --version

          # Run server and log output
          $bin ${{ matrix.aw_server_new_args }} >> log-new.txt 2>&1 &
          sleep 5  # wait for startup

          # Get server info
          curl "$url/api/0/info"

          # Get buckets
          curl "$url/api/0/buckets/" -H 'accept: application/json'

          # Send a heartbeat
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -X 'POST' --fail-with-body \
            "$url/api/0/buckets/aw-test/heartbeat?pulsetime=60" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d '{
            "timestamp": "'$timestamp'",
            "duration": 0,
            "data": {"key": "test value"}
          }'

          # Give a sec, then kill server process
          sleep 1
          kill $!

      - name: Output logs
        if: always()
        run: |
          cat log-old.txt || true
          echo "\n---\n"
          cat log-new.txt || true


  # Integration tests using make test-integration
  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python_version: ['3.12']

    env:
      TEST_TIMEOUT: ${{ inputs.test_timeout || '300' }}
      AW_SERVER_TIMEOUT: '60'
      AW_PYTEST_TIMEOUT: '120'
      AW_LOG_LINES: '200'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Print environment info
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Runner: $RUNNER_OS"
          echo "Architecture: $(uname -m)"
          echo "Python version: ${{ matrix.python_version }}"
          echo ""
          echo "Test Configuration:"
          echo "  Global timeout: ${TEST_TIMEOUT}s"
          echo "  Server startup timeout: ${AW_SERVER_TIMEOUT}s"
          echo "  Pytest timeout: ${AW_PYTEST_TIMEOUT}s"
          echo "  Log lines on failure: ${AW_LOG_LINES}"
          echo "  Skip build: ${{ inputs.skip_build }}"
          echo "  Version: ${{ inputs.version }}"

      - name: Install coreutils (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Set up Rust
        if: ${{ inputs.skip_build != 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Poetry
        run: |
          pip3 install poetry==1.4.2

      - name: Create virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          poetry install

      - name: Download ActivityWatch binary (skip_build=true)
        if: ${{ inputs.skip_build == 'true' }}
        shell: bash
        run: |
          set -e
          mkdir -p dist
          cd dist

          OS=${{ matrix.os }}
          if [ "$OS" = "ubuntu-latest" ] || [ "$OS" = "Linux" ]; then
            PLATFORM="linux"
          elif [ "$OS" = "macos-latest" ] || [ "$OS" = "macOS" ]; then
            PLATFORM="macos"
          else
            echo "ERROR: Unsupported OS: $OS"
            exit 1
          fi

          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH="x86_64"
          elif [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
            ARCH="arm64"
          fi

          VERSION="${{ inputs.version }}"
          if [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
            echo "Fetching latest release..."
            LATEST_JSON=$(curl -s https://api.github.com/repos/ActivityWatch/activitywatch/releases/latest)
            VERSION=$(echo "$LATEST_JSON" | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
            echo "Latest version: $VERSION"
          fi

          # Remove 'v' prefix for filename if present
          VERSION_NO_V=$(echo "$VERSION" | sed -e 's/^v//')

          ZIP_FILE="activitywatch-${VERSION_NO_V}-${PLATFORM}-${ARCH}.zip"
          DOWNLOAD_URL="https://github.com/ActivityWatch/activitywatch/releases/download/${VERSION}/${ZIP_FILE}"

          echo "Platform: $PLATFORM"
          echo "Arch: $ARCH"
          echo "Version: $VERSION"
          echo "Version (no v): $VERSION_NO_V"
          echo "Download URL: $DOWNLOAD_URL"

          echo ""
          echo "Downloading $ZIP_FILE..."
          curl -f -L -o "$ZIP_FILE" "$DOWNLOAD_URL"

          echo ""
          echo "Unzipping..."
          unzip -q "$ZIP_FILE"
          ls -la activitywatch/

          echo ""
          echo "Done. Binary location: $(pwd)/activitywatch/"

      - name: Build ActivityWatch (skip_build=false)
        if: ${{ inputs.skip_build != 'true' }}
        run: |
          source venv/bin/activate
          make build SKIP_WEBUI=true SKIP_SERVER_RUST=false
          ls -la dist/

      - name: Find server binary
        shell: bash
        run: |
          set -e
          echo "Looking for server binary..."
          echo ""

          SERVER_BIN=""

          # Try aw-server-rust first (most likely for Tauri build)
          if [ -f "dist/activitywatch/aw-server-rust/aw-server" ]; then
            SERVER_BIN="dist/activitywatch/aw-server-rust/aw-server"
          elif [ -f "dist/activitywatch/aw-server-rust/aw-server.exe" ]; then
            SERVER_BIN="dist/activitywatch/aw-server-rust/aw-server.exe"
          # Try aw-server (Python)
          elif [ -f "dist/activitywatch/aw-server/aw-server" ]; then
            SERVER_BIN="dist/activitywatch/aw-server/aw-server"
          elif [ -f "dist/activitywatch/aw-server/aw-server.exe" ]; then
            SERVER_BIN="dist/activitywatch/aw-server/aw-server.exe"
          fi

          if [ -z "$SERVER_BIN" ]; then
            echo "ERROR: Could not find server binary"
            echo ""
            echo "Contents of dist/:"
            ls -la dist/ 2>/dev/null || echo "(dist/ not found)"
            echo ""
            echo "Contents of dist/activitywatch/ (if exists):"
            ls -la dist/activitywatch/ 2>/dev/null || echo "(dist/activitywatch/ not found)"
            exit 1
          fi

          echo "Found server binary: $SERVER_BIN"
          echo "AW_SERVER_BIN=${SERVER_BIN}" >> $GITHUB_ENV

      - name: Determine and output version
        run: |
          source venv/bin/activate

          TAG_VERSION=$(bash scripts/package/getversion.sh --tag)
          DISPLAY_VERSION=$(bash scripts/package/getversion.sh --display)

          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV
          echo "DISPLAY_VERSION=${DISPLAY_VERSION}" >> $GITHUB_ENV

          echo "========================================"
          echo "Build Version Information"
          echo "========================================"
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub ref_name: ${{ github.ref_name }}"
          echo "TAG_VERSION:        ${TAG_VERSION}"
          echo "DISPLAY_VERSION:    ${DISPLAY_VERSION}"
          echo "========================================"

      - name: Run integration tests
        id: integration_tests
        shell: bash
        timeout-minutes: 10
        run: |
          source venv/bin/activate

          echo "========================================"
          echo "Running Integration Tests"
          echo "========================================"
          echo "Server binary: $AW_SERVER_BIN"
          echo "Server port: ${AW_SERVER_PORT:-5666}"
          echo "Server timeout: ${AW_SERVER_TIMEOUT}s"
          echo "Global test timeout: ${TEST_TIMEOUT}s"
          echo ""

          export AW_SERVER_BIN="$AW_SERVER_BIN"
          export AW_SERVER_TIMEOUT="$AW_SERVER_TIMEOUT"
          export AW_LOG_LINES="$AW_LOG_LINES"
          export AW_TEST_TIMEOUT="$TEST_TIMEOUT"
          export AW_PYTEST_TIMEOUT="$AW_PYTEST_TIMEOUT"

          # Run tests with timeout protection
          # Using timeout/gtimeout with SIGKILL as last resort
          # Also using pytest-timeout as per-test protection

          if [ "$RUNNER_OS" = "Linux" ]; then
            timeout --signal=SIGKILL "$TEST_TIMEOUT" \
              pytest scripts/tests/integration_tests.py -v \
                --timeout="$AW_PYTEST_TIMEOUT" \
                -o timeout_method=thread
          elif [ "$RUNNER_OS" = "macOS" ]; then
            gtimeout --signal=SIGKILL "$TEST_TIMEOUT" \
              pytest scripts/tests/integration_tests.py -v \
                --timeout="$AW_PYTEST_TIMEOUT" \
                -o timeout_method=thread
          else
            # Windows (though we're not testing Windows yet)
            pytest scripts/tests/integration_tests.py -v \
              --timeout="$AW_PYTEST_TIMEOUT" \
              -o timeout_method=thread
          fi

      - name: Output test result
        if: always()
        run: |
          echo "========================================"
          echo "Integration Tests Result"
          echo "========================================"
          echo "OS: ${{ matrix.os }}"
          echo "Python: ${{ matrix.python_version }}"
          echo ""
          echo "Test Status (from step.outcome): ${{ steps.integration_tests.outcome }}"
          echo ""
          if [ "${{ steps.integration_tests.outcome }}" = "success" ]; then
            echo "✅ Tests PASSED"
          elif [ "${{ steps.integration_tests.outcome }}" = "failure" ]; then
            echo "❌ Tests FAILED"
          elif [ "${{ steps.integration_tests.outcome }}" = "cancelled" ]; then
            echo "⏹️ Tests CANCELLED (possibly timeout)"
          else
            echo "⚠️ Tests: ${{ steps.integration_tests.outcome }}"
          fi
          echo ""
          echo "Timeout protection in place:"
          echo "  - Global: ${TEST_TIMEOUT}s (via timeout/gtimeout)"
          echo "  - Per-test: ${AW_PYTEST_TIMEOUT}s (via pytest-timeout)"
          echo "========================================"

